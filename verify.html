<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Mask Verification — MaskOS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-bg: #0f172a;
            --color-surface: #1e293b;
            --color-text: #f1f5f9;
            --color-text-secondary: #94a3b8;
            --color-text-muted: #64748b;
            --color-accent: #3b82f6;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .verify-wrapper {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; min-height: 100dvh;
            background: var(--color-bg);
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.1) 0%, transparent 50%);
            padding: 24px;
        }
        
        .verify-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 440px; width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: var(--shadow-xl);
            text-align: center;
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .verify-header {
            padding: 36px 32px 28px;
            transition: background 0.3s ease;
        }
        .verify-header h1 { font-size: 1.375rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .verify-header p { font-size: 0.8125rem; opacity: 0.8; color: #fff; }
        
        .verify-body { padding: 32px; color: var(--color-text); }
        
        .status-icon {
            width: 72px; height: 72px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 2rem;
        }
        .status-icon.success { background: rgba(16,185,129,0.15); }
        .status-icon.error { background: rgba(239,68,68,0.15); }
        
        .sn-display {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 1.25rem; font-weight: 700;
            color: var(--color-accent); margin-bottom: 24px;
            letter-spacing: 0.5px; padding: 10px 16px;
            background: rgba(59,130,246,0.08);
            border-radius: 10px; display: inline-block;
        }
        
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; text-align: left; margin-bottom: 24px;
        }
        .info-item {
            background: rgba(255,255,255,0.04);
            padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .info-label {
            font-size: 0.6875rem; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--color-text-muted);
            font-weight: 600; margin-bottom: 4px;
        }
        .info-value { font-size: 0.9375rem; font-weight: 600; color: #fff; }
        
        .status-alert {
            padding: 14px 20px; border-radius: 12px;
            font-weight: 600; font-size: 0.9375rem;
        }
        .status-alert.repair { background: rgba(245,158,11,0.1); color: var(--color-warning); border: 1px solid rgba(245,158,11,0.2); }
        .status-alert.stock { background: rgba(16,185,129,0.1); color: var(--color-success); border: 1px solid rgba(16,185,129,0.2); }
        
        .error-title { font-size: 1.25rem; font-weight: 700; color: var(--color-danger); margin-top: 8px; }
        .error-text { color: var(--color-text-secondary); font-size: 0.875rem; margin-top: 8px; }
        
        .footer-text {
            margin-top: 24px; font-size: 0.75rem;
            color: var(--color-text-muted);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-accent); }
        
        .header-success { background: linear-gradient(135deg, #059669, #10b981); }
        .header-error { background: linear-gradient(135deg, #dc2626, #ef4444); }
        
        @media (max-width: 480px) {
            .verify-body { padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="verify-wrapper">
        <div class="verify-card" id="verify-card">
            <div class="verify-header header-success" id="verify-header">
                <h1 id="header-title">MaskOS Verification</h1>
                <p id="header-subtitle">Проверка подлинности продукции</p>
            </div>
            <div class="verify-body" id="verify-body">
                <div class="status-icon success" id="status-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-dasharray="63" stroke-dashoffset="63" id="check-circle"><animate attributeName="stroke-dashoffset" from="63" to="0" dur="0.6s" fill="freeze"/></circle><polyline points="8 12 11 15 16 9" stroke="#10b981" stroke-width="2.5" stroke-dasharray="12" stroke-dashoffset="12" id="check-mark"><animate attributeName="stroke-dashoffset" from="12" to="0" dur="0.3s" begin="0.3s" fill="freeze"/></polyline></svg>
                </div>
                <p style="color:#94a3b8">Загрузка данных...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ckwvyouciszfaigvowfv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrd3Z5b3VjaXN6ZmFpZ3Zvd2Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTU3MjgsImV4cCI6MjA5NzQzMTcyOH0.EVIxNi4TdUOKqGqZKViJpSq4RCrnj6BwWjawdDQyyNE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkMask() {
            const params = new URLSearchParams(window.location.search);
            const sn = params.get('sn');

            if (!sn) {
                setError('Неверный запрос', 'Серийный номер не указан.');
                return;
            }

            try {
                const { data, error } = await supabase.from('masks')
                    .select('*').eq('serial_number', sn).single();

                if (error || !data) {
                    setError('Не найдено', `Серийный номер <b style="color:#fff">${sn}</b> отсутствует в официальной базе производства. Возможна подделка.`);
                    return;
                }

                const modelMap = { 'f': 'Foil', 'e': 'Epee', 's': 'Sabre', 'c': 'Trainer' };
                const dateObj = new Date(data.created_at);
                const dateStr = `${String(dateObj.getDate()).padStart(2,'0')}.${String(dateObj.getMonth()+1).padStart(2,'0')}.${dateObj.getFullYear()}`;
                const isRepair = data.status === 'В ремонте';

                document.getElementById('verify-header').className = 'verify-header header-success';
                document.getElementById('header-title').textContent = 'Оригинальная продукция';
                document.getElementById('header-subtitle').textContent = 'Подтверждено MaskOS';

                document.getElementById('verify-body').innerHTML = `
                    <div class="status-icon success">✅</div>
                    <div class="sn-display">${data.serial_number}</div>
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">Модель</span><span class="info-value">${modelMap[data.model_code]}</span></div>
                        <div class="info-item"><span class="info-label">Размер</span><span class="info-value">${data.size}</span></div>
                        <div class="info-item"><span class="info-label">Подкладка</span><span class="info-value">${data.lining || '—'}</span></div>
                        <div class="info-item"><span class="info-label">Дата выпуска</span><span class="info-value">${dateStr}</span></div>
                    </div>
                    <div class="status-alert ${isRepair ? 'repair' : 'stock'}">
                        ${isRepair ? '🔧 В ремонте' : '✓ На складе'} — ${data.status || 'На складе'}
                    </div>
                    <div class="footer-text">
                        <span class="footer-dot"></span> MaskOS Tracking System
                    </div>
                `;
            } catch (err) {
                setError('Ошибка', 'Не удалось проверить данные. Попробуйте позже.');
            }
        }

        function setError(title, message) {
            document.getElementById('verify-header').className = 'verify-header header-error';
            document.getElementById('header-title').textContent = title;
            document.getElementById('header-subtitle').textContent = 'MaskOS Verification';
            document.getElementById('verify-body').innerHTML = `
                <div class="status-icon error">⚠️</div>
                <div class="error-title">Предупреждение</div>
                <p class="error-text">${message}</p>
                <div class="footer-text" style="margin-top:20px">
                    <span class="footer-dot" style="background:#ef4444"></span> MaskOS Tracking System
                </div>
            `;
        }

        checkMask();
    </script>
</body>
</html>
